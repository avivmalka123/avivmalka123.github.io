<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Aviv Malka — בנייה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06060e;color:#eeeef5;font-family:'Heebo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.glow{position:fixed;top:-20%;right:-10%;width:800px;height:800px;background:radial-gradient(circle,rgba(168,85,247,0.20) 0%,transparent 60%);pointer-events:none;}
.glow2{position:fixed;bottom:-25%;left:-8%;width:600px;height:600px;background:radial-gradient(circle,rgba(236,72,153,0.15) 0%,transparent 60%);pointer-events:none;}
.box{position:relative;z-index:1;text-align:center;max-width:480px;}
.dot{width:64px;height:64px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 24px;box-shadow:0 12px 36px rgba(168,85,247,0.35);}
h1{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:14px;}
.gr{background:linear-gradient(135deg,#a855f7,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
p{font-size:15px;color:#b0b0cc;line-height:1.7;}
.chip{display:inline-flex;align-items:center;gap:8px;background:rgba(168,85,247,0.10);border:1px solid rgba(168,85,247,0.30);color:#c4a8ff;padding:6px 14px;border-radius:100px;font-size:11px;font-weight:800;margin-top:18px;letter-spacing:0.5px;}
.chip .pulse{width:6px;height:6px;background:#10b981;border-radius:50%;box-shadow:0 0 8px rgba(16,185,129,0.6);animation:p 2s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>
<div class="box">
  <div class="dot">✦</div>
  <h1>בונה <span class="gr">גרסה מאובטחת</span></h1>
  <p>הדשבורד עובר ל-Next.js + Auth + Database עם הזדהות בענן.<br>חוזר תוך זמן קצר — רק לי תהיה גישה.</p>
  <div class="chip"><span class="pulse"></span>בנייה בעיצומה</div>
</div>
</body>
</html>
