<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="refresh" content="0; url=https://aviv-tools.vercel.app/">
<title>Aviv Malka ✦ Tools</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06060e;color:#eeeef5;font-family:'Heebo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.glow{position:fixed;top:-20%;right:-10%;width:800px;height:800px;background:radial-gradient(circle,rgba(168,85,247,0.20) 0%,transparent 60%);pointer-events:none;}
.glow2{position:fixed;bottom:-25%;left:-8%;width:600px;height:600px;background:radial-gradient(circle,rgba(236,72,153,0.15) 0%,transparent 60%);pointer-events:none;}
.box{position:relative;z-index:1;text-align:center;max-width:480px;}
.dot{width:64px;height:64px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 24px;color:#fff;box-shadow:0 12px 36px rgba(168,85,247,0.35);}
h1{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:14px;}
.gr{background:linear-gradient(135deg,#a855f7,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
p{font-size:14px;color:#b0b0cc;line-height:1.7;margin-bottom:20px;}
a.btn{display:inline-block;padding:12px 24px;border-radius:12px;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;text-decoration:none;font-weight:800;font-size:13px;transition:transform .15s;}
a.btn:hover{transform:translateY(-1px);}
</style>
<script>
// JavaScript fallback redirect (in case meta refresh is delayed)
window.location.replace('https://aviv-tools.vercel.app/');
</script>
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>
<div class="box">
  <div class="dot">✦</div>
  <h1>עברנו <span class="gr">לכתובת חדשה</span></h1>
  <p>הדשבורד עבר ל-Next.js + Auth מאובטח.<br>אם לא הופנית אוטומטית:</p>
  <a class="btn" href="https://aviv-tools.vercel.app/">פתח דשבורד ←</a>
</div>
</body>
</html>
